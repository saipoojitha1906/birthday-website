<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Unlock My Surprise ❤️</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="password.css">

</head>

<body>

    <!-- Floating Hearts -->
    <div class="hearts">
        <span>❤️</span>
        <span>💕</span>
        <span>💖</span>
        <span>💗</span>
        <span>💞</span>
        <span>💝</span>
        <span>💕</span>
        <span>❤️</span>
    </div>

    <!-- Floating Balloons -->
    <div class="balloon balloon1"></div>
    <div class="balloon balloon2"></div>
    <div class="balloon balloon3"></div>
    <div class="balloon balloon4"></div>

    <!-- Main Card -->
    <div class="card">

        <div class="lock-icon">
            🔐
        </div>

        <h1>Secret Password</h1>

        <p class="subtitle">
            Only someone very special knows the password ❤️
        </p>

        <input
            type="password"
            id="password"
            placeholder="Enter Password">

        <button onclick="checkPassword()">
            Unlock ❤️
        </button>

        <p id="error"></p>

        <div id="success" class="hidden">

            <h2>🎉 Welcome Asritha ❤️</h2>

            <p>
                Your magical birthday journey is about to begin...
            </p>

            <div class="loading">
                <div class="loader"></div>
            </div>

            <p class="loading-text">
                Loading surprises...
            </p>

        </div>

    </div>

    <!-- Background Sparkles -->
    <div class="sparkles">
        <span>✨</span>
        <span>✨</span>
        <span>✨</span>
        <span>✨</span>
        <span>✨</span>
    </div>

    <script src="password.js"></script>

</body>

</html>
