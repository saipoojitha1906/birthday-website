<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>A Message For You ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:linear-gradient(135deg,#ffd6e8,#ffe6f2,#fff7fb);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

/* Floating Hearts */

.hearts{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
}

.hearts span{
position:absolute;
bottom:-50px;
font-size:28px;
animation:floatHeart linear infinite;
}

.hearts span:nth-child(1){left:8%;animation-duration:8s;}
.hearts span:nth-child(2){left:25%;animation-duration:11s;}
.hearts span:nth-child(3){left:45%;animation-duration:9s;}
.hearts span:nth-child(4){left:65%;animation-duration:12s;}
.hearts span:nth-child(5){left:85%;animation-duration:10s;}

@keyframes floatHeart{

0%{
transform:translateY(0) scale(.5);
opacity:0;
}

20%{
opacity:1;
}

100%{
transform:translateY(-120vh) scale(1.4);
opacity:0;
}

}

/* Card */

.card{
width:750px;
max-width:90%;
background:white;
padding:45px;
border-radius:30px;
text-align:center;
box-shadow:0 15px 35px rgba(255,105,180,.35);
animation:fade 1s;
}

@keyframes fade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.icon{
font-size:90px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{

50%{
transform:scale(1.15);
}

}

h1{
color:#ff2d7a;
margin:20px 0;
font-size:42px;
}

p{
font-size:20px;
line-height:1.8;
color:#6b2151;
margin-bottom:20px;
}

.quote{
font-style:italic;
color:#ff4d94;
font-size:18px;
margin:25px 0;
}

audio{
width:100%;
margin-top:20px;
}

button{

margin-top:30px;
padding:15px 35px;
border:none;
border-radius:40px;
background:#ff4d94;
color:white;
font-size:18px;
cursor:pointer;
transition:.3s;

}

button:hover{

background:#ff2d7a;
transform:scale(1.08);

}

</style>

</head>

<body>

<div class="hearts">

<span>❤️</span>
<span>💕</span>
<span>💖</span>
<span>💗</span>
<span>💞</span>

</div>

<div class="card">

<div class="icon">🎙️</div>

<h1>A Special Message For You ❤️</h1>

<p>

I wanted you to hear something even more special...

Every word comes straight from my heart.

</p>

<p class="quote">

"Close your eyes, press play, and listen carefully... 💖"

</p>

<audio controls>

<source src="audio.mp3" type="audio/mpeg">

Your browser does not support the audio element.

</audio>

<br>

<button onclick="location.href='home.html'">

🏠 Back to Home

</button>

</div>

</body>
</html>
